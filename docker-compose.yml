# SparkNode Docker Compose Configuration
# All ports and settings are loaded from .env file
# Run: docker compose up -d

services:
  postgres:
    image: postgres:15.8-alpine
    container_name: ${PROJECT_NAME:-sparknode}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sparknode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sparknode_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-sparknode}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-6432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sparknode}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-sparknode}-redis
    restart: unless-stopped
    # Persist Celery job state and cached data across container restarts
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "${REDIS_EXTERNAL_PORT:-7379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  backend:
    image: zuber2301/sparknode-app-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-sparknode}-backend
    restart: unless-stopped
    environment:
      # PRODUCTION: set APP_DATABASE_URL in .env — do NOT use the default below in production
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://sparknode:sparknode_secret_2024@postgres:5432/sparknode}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sparknode:sparknode_secret_2024@postgres:5432/sparknode}
      # PRODUCTION: generate a strong key: openssl rand -hex 32
      SECRET_KEY: ${SECRET_KEY:-sparknode-super-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:6173}
      # PRODUCTION: set ENABLE_DOCS=false to hide /docs and /redoc
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@sparknode.com}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    ports:
      - "${BACKEND_EXTERNAL_PORT:-6100}:8000"
    volumes:
      - ./backend:/app
      - ./database:/app/database:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    # --reload is a development-only flag; use multiple workers for production.
    # Override UVICORN_WORKERS in .env (default: 1 for local dev).
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-1}

  celery:
    image: zuber2301/sparknode-app-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-sparknode}-celery
    restart: unless-stopped
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL:-postgresql://sparknode:sparknode_secret_2024@postgres:5432/sparknode}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sparknode:sparknode_secret_2024@postgres:5432/sparknode}
      SECRET_KEY: ${SECRET_KEY:-sparknode-super-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:6173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@sparknode.com}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - postgres
    networks:
      - app-network
    command: celery -A core.celery_app.celery_app worker --loglevel=info

  frontend:
    image: zuber2301/sparknode-app-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-sparknode}-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-6173}:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    external: true
    name: ${PROJECT_NAME:-sparknode}_postgres_data
  # Redis AOF persistence — survives container restarts without external volume flag
  redis_data:

networks:
  app-network:
    name: ${PROJECT_NAME:-sparknode}-network
    driver: bridge
