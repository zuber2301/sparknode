# Development overrides for docker-compose.yml
# This file is automatically merged with docker-compose.yml when running docker-compose
# Use this for development-specific configurations

version: '3.8'

services:
  frontend:
    # Override build for development with better caching
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: development
      # Use cache mounts for faster development builds
      cache_from:
        - zuber2301/sparknode-app-frontend:latest
    # Mount source code for hot reloading during development
    volumes:
      - ./frontend/src:/app/src:cached
      - ./frontend/public:/app/public:cached
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/package-lock.json:/app/package-lock.json:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
    # Override command to run development server
    command: npm run dev
    # Override ports for development
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-6173}:5173"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:7100
    # Disable healthcheck in development
    healthcheck:
      disable: true

  # Development database with persistent data
  postgres:
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-7432}:5432"

volumes:
  postgres_dev_data:
    driver: local