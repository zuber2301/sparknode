# ── Rate limiting zones ───────────────────────────────────────────────────────
# API zone: 20 req/s per IP, burst of 40 (handles brief spikes without 429)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
# Auth zone: stricter — 5 req/s to protect login/register endpoints
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# ── Gzip compression ─────────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/x-javascript
  image/svg+xml
  font/woff2;

server {
  listen 80;
  server_name _;

  # Never leak nginx version in Server header or error pages
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ────────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Content-Security-Policy: adjust 'self' sources when integrating third-party CDNs
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self';" always;

  # LOCAL-DEV: The DockerHub image is compiled with VITE_API_URL=https://app.sparknode.io.
  # sub_filter rewrites that URL to an empty string in the served JS bundle so
  # the frontend makes relative /api/... requests that nginx proxies to the local
  # backend — no Docker rebuild required.
  sub_filter_types application/javascript text/javascript;
  sub_filter '"https://app.sparknode.io"' '""';
  sub_filter_once off;

  # Never cache index.html so the browser always picks up new hashed assets
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files /index.html =404;
  }

  # Hashed static assets — safe to cache forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Pass through auth requests with a stricter rate limit
  location ~ ^/api/(auth|tenants/register) {
    limit_req zone=auth_limit burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
  }

  # Pass through all other API requests to backend
  location /api/ {
    limit_req zone=api_limit burst=40 nodelay;
    limit_req_status 429;

    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
  }

  # Fallback for missing assets
  location = /sparknode-icon.svg {
    try_files /sparknode-icon.svg =404;
  }
}
