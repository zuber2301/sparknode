# Custom SparkNode Postgres configuration
# Enables WAL-level replication and prepares the server for WAL-G archiving.
#
# To activate real WAL-G backups:
#   1. Build a custom postgres image that includes the WAL-G binary.
#   2. Set WALG_S3_PREFIX (or equivalent) in the container environment.
#   3. Replace the archive_command below with: 'wal-g wal-push %p'

# Accept connections from any interface (required when running in Docker so
# other containers on the bridge network can reach this instance).
listen_addresses = '*'

# ── Connections ───────────────────────────────────────────────────────────────
# Allow enough connections for multi-worker uvicorn + celery pool.
# Formula: UVICORN_WORKERS × (pool_size=20 + max_overflow=10) + celery-pool
# Default headroom for 4 workers + celery: (4×30) + 20 = 140; 200 gives buffer.
max_connections = 200

# ── Memory ────────────────────────────────────────────────────────────────────
# 128 MB shared_buffers is a reasonable starting point inside a container.
# For production with dedicated RAM, set to ~25 % of available RAM.
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ── Write-Ahead Log ───────────────────────────────────────────────────────────
wal_level = replica
archive_mode = on

# Safe default: discard WAL segments until a proper WAL-G image is in use.
# Change to 'wal-g wal-push %p' once WAL-G is installed in the postgres container.
archive_command = '/bin/true'

# Uncomment when using WAL-G for point-in-time recovery:
# restore_command = 'wal-g wal-fetch %f %p'

# Keep at least 1 GB of WAL on disk so a lagging replica or brief archive
# failure doesn't force a full re-sync.
wal_keep_size = 1024

# ── Checkpoints ───────────────────────────────────────────────────────────────
# Spread checkpoint I/O over 80 % of the interval to reduce write spikes.
checkpoint_completion_target = 0.9
# Maximum time between automatic checkpoints (default 5 min is too aggressive
# for write-heavy workloads; 15 min balances durability and I/O).
checkpoint_timeout = 15min
# Cap the WAL generated between checkpoints to avoid very long recovery times.
max_wal_size = 2GB
min_wal_size = 256MB

# ── Replication ───────────────────────────────────────────────────────────────
archive_timeout = 60
max_wal_senders = 10

# ── Durability ────────────────────────────────────────────────────────────────
# fsync and synchronous_commit are ON by default — do not disable them in
# production as it risks data loss on crash.
# synchronous_commit = on  # (default)

# ── Logging ───────────────────────────────────────────────────────────────────
# Log queries taking longer than 1 second so slow queries are visible in
# docker logs without requiring pg_stat_statements in production.
log_min_duration_statement = 1000
log_line_prefix = '%t [%p] %u@%d '
log_timezone = 'UTC'
